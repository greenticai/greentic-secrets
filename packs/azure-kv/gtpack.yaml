schema_version: pack-v1
id: greentic.secrets.azure-kv
version: "__PACK_VERSION__"
name: "Azure Key Vault provider pack"
description: "Enterprise flows for Azure Key Vault: onboarding, validation, read/write, rotation, audit export, breakglass."
kind: provider
entrypoints:
  onboard: flows/provider_onboard.ygtc
  validate: flows/provider_validate.ygtc
  read_secret: flows/provider_read_secret.ygtc
  write_secret: flows/provider_write_secret.ygtc
  rotate_secret: flows/provider_rotate_secret.ygtc
  export_audit: flows/provider_export_audit.ygtc
  breakglass: flows/provider_breakglass.ygtc
components:
  - id: greentic.secrets.provider.azure_kv
    version: "__PACK_VERSION__"
    source: oci
    uri: ghcr.io/greenticai/components/secrets-provider-azure-kv:__PACK_VERSION__
  # FIXME(generators): Removed unresolved component reference.
  # Restore after publishing ghcr.io/greenticai/components/greentic.secrets.generators:__PACK_VERSION__.
  # FIXME(audit-exporter): Removed unresolved component reference.
  # Restore after publishing ghcr.io/greenticai/components/greentic.secrets.audit_exporter:__PACK_VERSION__.
  # FIXME(policy-validator): Removed unresolved component reference.
  # Restore after publishing ghcr.io/greenticai/components/greentic.secrets.policy_validator:__PACK_VERSION__.
schemas:
  config: schemas/secrets/azure-kv/config.schema.json
  secrets: schemas/secrets/azure-kv/secret.schema.json
metadata: metadata.json
extensions:
  greentic.provider-extension.v1:
    kind: greentic.provider-extension.v1
    version: "1.0.0"
    provider:
      id: greentic.secrets.azure-kv
      runtime:
        world: "greentic:provider-schema-core/schema-core@1.0.0"
        component_ref: ghcr.io/greenticai/components/secrets-provider-azure-kv:__PACK_VERSION__
        export: "invoke"
  greentic.secrets.validators.v1:
    kind: greentic.secrets.validators.v1
    version: "1.0.0"
    validators:
      - id: greentic.validators.secrets
        world: "greentic:pack-validate/pack-validator@0.1.0"
        component_ref: ghcr.io/greenticai/validators/secrets:__PACK_VERSION__
