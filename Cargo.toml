[workspace.dependencies.greentic_secrets_provider_vault_kv]
package = "greentic-secrets-provider-vault-kv"
version = ">=1.2.0-dev, <1.3.0-0"
path = "providers/greentic-vault-kv"

[workspace.dependencies.secrets-core]
package = "greentic-secrets-core"
version = ">=1.2.0-dev, <1.3.0-0"
path = "greentic-secrets-core"

[workspace.dependencies.secrets-provider-dev]
package = "greentic-secrets-provider-dev"
version = ">=1.2.0-dev, <1.3.0-0"
path = "providers/greentic-dev"

[workspace.dependencies.secrets-provider-aws-sm]
