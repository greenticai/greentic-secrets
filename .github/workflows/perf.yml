name: Perf (lightweight)

on:
  # Nightly-only per plans/binary-bifurcation.md Phase A.8: push-trigger removed
  # because post-merge perf runs were burning 15+ min without actionable signal.
  schedule:
    - cron: "35 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  perf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run perf guard tests
        run: cargo test -p greentic-secrets-core --test perf_scaling --test perf_timeout

      - name: Run benchmarks (smoke)
        run: cargo bench -p greentic-secrets-core --bench perf -- --sample-size 10
