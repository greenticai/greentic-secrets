name: Check crates (package dry-run)

permissions:
  contents: read

on:
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.1

      - name: Package all publishable crates (dry-run)
        run: |
          metadata_json=$(cargo metadata --format-version 1 --no-deps)
          workspace_packages=$(printf '%s\n' "$metadata_json" \
            | jq -r '.packages[] | .name' \
            | sort -u)
          failures=0
          for PKG in $workspace_packages; do
            if ! printf '%s\n' "$metadata_json" \
              | jq -e --arg pkg "$PKG" '.packages[] | select(.name == $pkg and .publish != ["false"])' >/dev/null; then
              continue
            fi
            echo "::group::Packaging $PKG"
            if ! cargo package -p "$PKG" --allow-dirty; then
              failures=1
            fi
            echo "::endgroup::"
          done
          exit $failures
