name: Check crates (package dry-run)

permissions:
  contents: read

on:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0

      - name: Package all publishable crates (dry-run)
        # Package the whole workspace in one invocation so that coordinated
        # multi-crate changes verify each crate against the locally-packaged
        # sibling versions. A per-crate `cargo package -p` loop verifies each
        # tarball in isolation, resolving sibling deps from the registry — which
        # fails whenever a PR adds a new cross-crate API and its consumer
        # together (the lower crate's new version isn't published yet).
        # `--workspace` already skips `publish = false` crates.
        run: cargo package --workspace --allow-dirty
