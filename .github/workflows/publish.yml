name: Publish crates (single or workspace)

on:
  push:
    branches: [ master ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  OCI_REGISTRY: ghcr.io
  OCI_NAMESPACE: ${{ github.repository_owner }}
  OCI_REPO: packs/secrets

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Lint & Test
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo build --workspace --all-features --locked
          cargo test --workspace --all-features --locked -- --nocapture

  sync-packs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify provider pack sources exist
        run: |
          test -f packs/aws-sm/pack.yaml
          test -f packs/azure-kv/pack.yaml
          test -f packs/gcp-sm/pack.yaml
          test -f packs/k8s/pack.yaml
          test -f packs/vault-kv/pack.yaml

  flow-doctor:
    runs-on: ubuntu-latest
    needs: sync-packs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.1
      - uses: Swatinem/rust-cache@v2
      - name: Cache cargo bin tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-tools-${{ runner.os }}-v1
      - name: Install cargo-binstall
        run: |
          if ! command -v cargo-binstall >/dev/null 2>&1; then
            cargo install cargo-binstall --locked
          fi
      - name: Install greentic-provision
        run: |
          cargo binstall greentic-provision --force --no-confirm --locked || cargo install greentic-provision --force --locked
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          command -v greentic-provision
      - name: Validate provisioning fixtures
        run: ./scripts/validate-provision-fixtures.sh

  publish-components:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    needs: sync-packs
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.90 with wasm target
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip2
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Build components (wasm)
        env:
          COMPONENTS_REGISTRY: ghcr.io/${{ github.repository_owner }}/components
        run: ./scripts/build-components.sh
      - name: Set up ORAS
        uses: oras-project/setup-oras@v1
        with:
          version: 1.2.0
      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [[ -z "${GHCR_TOKEN:-}" ]]; then
            echo "GHCR_TOKEN is required for GHCR publish." >&2
            exit 1
          fi
          echo "${GHCR_TOKEN}" | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Publish components to GHCR
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: ./scripts/publish-components.sh
      - name: Upload component digests
        uses: actions/upload-artifact@v4
        with:
          name: component-digests
          path: target/components/digests.json
          if-no-files-found: error

  questions-component-test:
    runs-on: ubuntu-latest
    needs: sync-packs
    steps:
      - uses: actions/checkout@v4
      - name: Questions component placeholder
        run: echo "greentic-secrets has no questions component pack tests."

  build-packs:
    runs-on: ubuntu-latest
    needs: [sync-packs, flow-doctor, publish-components, questions-component-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.1
      - uses: Swatinem/rust-cache@v2
      - name: Cache cargo bin tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-tools-${{ runner.os }}-v1
      - name: Install cargo-binstall
        run: |
          if ! command -v cargo-binstall >/dev/null 2>&1; then
            cargo install cargo-binstall --locked
          fi
      - name: Install greentic-pack
        run: |
          cargo binstall greentic-pack --force --no-confirm --locked || cargo install greentic-pack --force --locked
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          greentic-pack --version
      - name: Install greentic-provision
        run: |
          cargo binstall greentic-provision --force --no-confirm --locked || cargo install greentic-provision --force --locked
      - name: Install oras
        uses: oras-project/setup-oras@v1
        with:
          version: 1.2.0
      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [[ -z "${GHCR_TOKEN:-}" ]]; then
            echo "GHCR_TOKEN is required for GHCR publish." >&2
            exit 1
          fi
          echo "${GHCR_TOKEN}" | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Pack unit validation
        run: cargo test -p greentic-secrets-runner pack_validation
      - name: Build packs
        env:
          REGISTRY_OWNER: ${{ github.repository_owner }}
          PACK_OFFLINE: "0"
          PACK_USE_LOCAL_COMPONENTS: "1"
        run: ./scripts/build-provider-packs.sh
      - name: Upload packs + fixtures report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: packs-and-fixtures
          path: |
            dist/packs/*.gtpack
            packs.lock.json
          if-no-files-found: warn
      - name: Upload built packs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-gtpack-artifacts
          path: dist/packs/*.gtpack
          if-no-files-found: error
      - name: Upload packs lockfile (dry-run)
        uses: actions/upload-artifact@v4
        with:
          name: packs-lockfile-dryrun
          path: packs.lock.json
          if-no-files-found: error

  publish-crates:
    if: github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.1
      - uses: Swatinem/rust-cache@v2
      - name: Publish changed crates
        uses: katyo/publish-crates@v2
        with:
          path: .
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          ignore-unpublished-changes: true
          check-repo: true
          dry-run: false

  publish-packs:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
    needs: build-packs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Install oras
        uses: oras-project/setup-oras@v1
        with:
          version: 1.2.0
      - name: Download built packs
        uses: actions/download-artifact@v4
        with:
          name: secrets-gtpack-artifacts
          path: dist/packs
      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [[ -z "${GHCR_TOKEN:-}" ]]; then
            echo "GHCR_TOKEN is required for GHCR publish." >&2
            exit 1
          fi
          echo "${GHCR_TOKEN}" | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Publish packs
        env:
          OCI_NAMESPACE: ${{ github.repository_owner }}
          OCI_REPO: ${{ env.OCI_REPO }}
          PACK_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          PUBLISH_LATEST: "1"
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: ./scripts/publish-provider-packs.sh
      - name: Upload published packs lockfile
        uses: actions/upload-artifact@v4
        with:
          name: packs-lockfile-published
          path: packs.lock.json
          if-no-files-found: error
