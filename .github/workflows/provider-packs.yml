name: Provider Packs

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  PACKS_OCI_NAMESPACE: ${{ vars.PACKS_OCI_NAMESPACE || github.repository_owner }}

jobs:
  ensure-master:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce publish source branch
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "::error::Provider pack publishing must run from refs/heads/master. Current ref: ${GITHUB_REF}"
            exit 1
          fi

  build-and-push:
    needs: ensure-master
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.90
        uses: dtolnay/rust-toolchain@1.91.1

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zip yq

      - name: Cache Cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-greentic-pack-latest

      - name: Install cargo-binstall
        run: |
          if ! command -v cargo-binstall >/dev/null 2>&1; then
            curl -L https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-unknown-linux-gnu.tgz \
              | tar -xz -C "$HOME/.cargo/bin"
          fi

      - name: Install greentic-pack
        run: |
          cargo binstall greentic-pack --force --no-confirm --locked

      - name: Pack unit validation (provider-core extension + schemas + pack.lock)
        run: cargo test -p greentic-secrets-runner pack_validation

      - name: Validate packs
        run: ./scripts/validate-packs.sh

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        env:
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [[ -z "${GHCR_TOKEN:-}" ]]; then
            echo "GHCR_TOKEN is required for provider-pack build (private component pulls)." >&2
            exit 1
          fi
          user="${GHCR_USER:-${GITHUB_ACTOR}}"
          echo "${GHCR_TOKEN}" | oras login ghcr.io -u "${user}" --password-stdin

      - name: Publish components to GHCR
        env:
          COMPONENTS_REGISTRY: ghcr.io/greenticai/components
        run: ./scripts/publish-components.sh

      - name: Build provider packs
        env:
          COMPONENTS_REGISTRY: ghcr.io/greenticai/components
          PACK_USE_LOCAL_COMPONENTS: "1"
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GREENTIC_OCI_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GREENTIC_OCI_PASSWORD: ${{ secrets.GHCR_TOKEN }}
        run: ./scripts/build-provider-packs.sh

      - name: Write bundle descriptor for store compatibility
        run: |
          VERSION=$(cat dist/packs/VERSION)
          cat > dist/packs/README.txt <<EOF
          Provider packs for greentic-secrets (version ${VERSION}):
          - secrets-aws-sm.gtpack
          - secrets-azure-kv.gtpack
          - secrets-gcp-sm.gtpack
          - secrets-k8s.gtpack
          - secrets-vault-kv.gtpack
          - bundle: secrets-providers.gtpack
          EOF

      - name: Push packs to GHCR
        env:
          OCI_NAMESPACE: ${{ env.PACKS_OCI_NAMESPACE }}
          OCI_REPO: packs/secrets
          PACK_VERSION: ""
        run: |
          echo "Publishing provider packs from ${GITHUB_REF} to ghcr.io/${OCI_NAMESPACE}/${OCI_REPO}"
          VERSION=$(cat dist/packs/VERSION)
          PACK_VERSION="${VERSION}" ./scripts/publish-provider-packs.sh
